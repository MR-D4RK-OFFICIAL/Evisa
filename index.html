<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>eVisa Document</title>
    <style>
        /* RESET & GLOBAL */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* prevent text selection, but not breaking PDF interaction */
        }

        html, body {
            width: 100%;
            height: 100%;
            background-color: #ffffff; /* pure white background */
            overflow: hidden;         /* no scrollbars on html/body level */
        }

        /* IFRAME CONTAINER: full screen, no gaps */
        .pdf-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            border: none;
            background: #ffffff;
            display: block;
        }

        iframe {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            margin: 0;
            padding: 0;
            background: #ffffff;
        }

        /* fallback: no extra UI, no text, no buttons. Absolutely blank */
        .no-ui {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Full-screen iframe loading 'evisa.pdf' immediately -->
    <div class="pdf-container">
        <iframe 
            src="evisa.pdf" 
            title="eVisa Document"
            aria-label="eVisa Document"
            loading="eager"
            frameborder="0"
            allow="fullscreen"
            referrerpolicy="strict-origin-when-cross-origin">
        </iframe>
    </div>

    <script>
        (function() {
            // -----------------------------------------------------------------
            // 1. DISABLE RIGHT-CLICK (context menu) entirely on document
            // -----------------------------------------------------------------
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });

            // -----------------------------------------------------------------
            // 2. DISABLE COMMON DEVELOPER SHORTCUTS
            //    Prevents: F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U (view-source),
            //    Ctrl+Shift+C, Ctrl+Shift+K, and other inspector keys.
            //    Also block Ctrl+Shift+R but keeps standard refresh if needed,
            //    but according to strict "no dev tools" feel.
            // -----------------------------------------------------------------
            function blockDevTools(e) {
                // F12 key
                if (e.key === 'F12') {
                    e.preventDefault();
                    return false;
                }
                // Check for Ctrl combinations (or Cmd on Mac)
                const isCtrl = e.ctrlKey === true;
                const isShift = e.shiftKey === true;
                // Mac: metaKey (Command) often used for shortcuts, but typical dev shortcuts also use Ctrl on mac? 
                // However common key combos: Ctrl+Shift+I (dev tools), Ctrl+Shift+J (console), Ctrl+U (source)
                // Also consider Ctrl+Shift+C (inspector), Ctrl+Shift+K (console on Firefox)
                if (isCtrl && isShift) {
                    const key = e.key.toLowerCase();
                    if (key === 'i' || key === 'j' || key === 'c' || key === 'k') {
                        e.preventDefault();
                        return false;
                    }
                }
                // Ctrl+U (view source) - common on all browsers
                if (isCtrl && e.key.toLowerCase() === 'u') {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+Shift+R (hard refresh) doesn't necessarily open dev tools but might be annoying, 
                // but requirement only disables developer shortcuts that give console access.
                // Also block Ctrl+Shift+E (Chrome device emulation) / optional but fine.
                if (isCtrl && isShift && e.key.toLowerCase() === 'e') {
                    e.preventDefault();
                    return false;
                }
                // Additional: Ctrl+S (save page) - not required but not harmful if allowed, but we disable for consistent security look.
                // But original spec doesn't explicitly require save blocking, but to avoid any UI feel.
                // However better to block any shortcut that might show code or dev options – but keep reasonable.
                if (isCtrl && e.key.toLowerCase() === 's') {
                    e.preventDefault();
                    return false;
                }
                // For Mac: Cmd+Option+I / Cmd+Shift+I etc: metaKey + alt + i etc. 
                // Those also might trigger dev tools, we can block: e.metaKey && e.altKey && e.key === 'i'
                if (e.metaKey === true && e.altKey === true && e.key.toLowerCase() === 'i') {
                    e.preventDefault();
                    return false;
                }
                // Cmd+Shift+I (Mac)
                if (e.metaKey === true && e.shiftKey === true && e.key.toLowerCase() === 'i') {
                    e.preventDefault();
                    return false;
                }
                // Cmd+U (view source on mac)
                if (e.metaKey === true && e.key.toLowerCase() === 'u') {
                    e.preventDefault();
                    return false;
                }
                // optional extra: block Ctrl+Shift+P (command palette in dev tools)
                if (isCtrl && isShift && e.key.toLowerCase() === 'p') {
                    e.preventDefault();
                    return false;
                }
                return true;
            }

            window.addEventListener('keydown', blockDevTools);

            // -----------------------------------------------------------------
            // Additional measure: also disable right-click on iframe elements 
            // dynamically (though document listener already covers it, but better safe)
            // -----------------------------------------------------------------
            const pdfIframe = document.querySelector('iframe');
            if (pdfIframe) {
                pdfIframe.addEventListener('contextmenu', function(e) {
                    e.preventDefault();
                    return false;
                });
                // also prevent any possible key events bubbling from iframe content? 
                // due to same-origin constraints we can't fully control if the PDF viewer itself has shortcuts,
                // but right-click inside the PDF might be blocked via the iframe contextmenu, so that is covered.
            }

            // -----------------------------------------------------------------
            // Ensures that no extra borders or outlines appear on focus
            // -----------------------------------------------------------------
            const style = document.createElement('style');
            style.textContent = `
                *:focus {
                    outline: none;
                }
                body, html {
                    -webkit-tap-highlight-color: transparent;
                }
            `;
            document.head.appendChild(style);

            // -----------------------------------------------------------------
            // Also attempt to disable drag and drop on container to avoid any 
            // weird file drop UI that could be unwanted.
            // -----------------------------------------------------------------
            document.body.addEventListener('dragenter', function(e) {
                e.preventDefault();
                return false;
            });
            document.body.addEventListener('dragover', function(e) {
                e.preventDefault();
                return false;
            });
            document.body.addEventListener('drop', function(e) {
                e.preventDefault();
                return false;
            });

            // -----------------------------------------------------------------
            // Ensure that PDF container remains fullscreen after resize/orientation change
            // Already using vw/vh and fixed, but double-check parent layout
            // -----------------------------------------------------------------
            function enforceFullscreen() {
                const container = document.querySelector('.pdf-container');
                if (container) {
                    container.style.width = '100vw';
                    container.style.height = '100vh';
                }
                const ifrm = document.querySelector('iframe');
                if (ifrm) {
                    ifrm.style.width = '100%';
                    ifrm.style.height = '100%';
                }
                document.documentElement.style.overflow = 'hidden';
                document.body.style.overflow = 'hidden';
            }
            window.addEventListener('resize', enforceFullscreen);
            window.addEventListener('orientationchange', enforceFullscreen);
            enforceFullscreen();

            // -------------------------------------------------------------
            // Additional: for extreme edge cases, if PDF fails to load for
            // any reason (missing file) we do NOT show any error buttons or
            // messages that would break "no UI" rule. 
            // The iframe will show browser's native error message but that is 
            // minimal and not part of the design, but we don't add custom UI.
            // Requirement says "No text, no buttons, no navigation, no branding"
            // The browser default error page for missing PDF is not a UI element we added,
            // but preserves zero extra custom UI. Also the iframe covers full screen.
            // -------------------------------------------------------------
            
            // also handle possible selection events: disable any accidental text 
            // selection from container
            document.body.style.userSelect = 'none';
            document.body.style.webkitUserSelect = 'none';
            document.body.style.msUserSelect = 'none';

            // Make sure no scrollbars appear at all
            document.documentElement.style.margin = '0';
            document.documentElement.style.padding = '0';
            document.body.style.margin = '0';
            document.body.style.padding = '0';
            document.body.style.backgroundColor = '#ffffff';
            
            // Prevent zoom gestures from causing layout shifts? not necessary, but fine
            // Also block context menu on entire parent container
            const containerDiv = document.querySelector('.pdf-container');
            if (containerDiv) {
                containerDiv.addEventListener('contextmenu', (e) => e.preventDefault());
            }

            // Disable any unwanted popup or middle mouse click special handling
            window.onauxclick = (e) => {
                if (e.button === 1) e.preventDefault(); // middle click no action
            };
            
            // optional: ensure that the embedded pdf viewer itself doesn't create additional
            // "open" button or download UI (Adobe PDF or browser default viewer might have built-in 
            // save button / print etc. According to spec we only control HTML/CSS/JS, but we can't 
            // remove browser's PDF toolbar. However the requirement states "must instantly display PDF"
            // and "no open/download/click to view option anywhere". The viewer's native toolbar does 
            // contain download/print options but they are part of the browser's PDF viewer. 
            // Since the requirement only applies to our added elements (website UI), we have no 
            // extra buttons. If the client browser shows native PDF toolbar controls, that's browser behavior
            // beyond the HTML. Some browsers can be controlled via `#toolbar=0` parameter in PDF URL.
            // To improve compliance, we append `#toolbar=0` to the iframe source to hide native PDF 
            // toolbar in supporting viewers (Chromium, Firefox supports? Chromium-based supports 
            // `#toolbar=0` for built-in PDF viewer). That will give a more seamless document-only feel.
            // This fully aligns with "no extra UI" spirit. Let's update the iframe src to include hash 
            // parameter to hide PDF toolbar. Good security and minimal approach.
            
            // Update the iframe src dynamically to append `#toolbar=0` if not already.
            const iframeEl = document.querySelector('iframe');
            if (iframeEl) {
                let currentSrc = iframeEl.getAttribute('src');
                // Only modify if 'evisa.pdf' and no existing parameters we might interfere with
                if (currentSrc && currentSrc === 'evisa.pdf') {
                    // For modern browsers (Chrome/Edge), appending `#toolbar=0` hides the top toolbar 
                    // and also can use `#navpanes=0&scrollbar=0&toolbar=0` but we'll use simple.
                    // Ensure we don't break anything: use the PDF with fragment for minimal viewer.
                    // Some PDF versions might ignore, but doesn't hurt.
                    iframeEl.src = 'evisa.pdf#toolbar=0';
                }
                // if future use or the src changed, we keep consistency
            }
            
            // Additionally to avoid any borders that could appear from iframe after load
            // final check: remove any potential border on iframe via style reapply
            const iframeStyle = document.querySelector('iframe');
            if (iframeStyle) {
                iframeStyle.style.border = 'none';
                iframeStyle.style.outline = 'none';
            }
            
            // Ensure that there is no text selection even on accidental double-click
            document.onselectstart = function() { return false; };
            
            // Also disable context menu from document via passive false aggressive
            window.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            }, { capture: true, passive: false });
            
            // disable print shortcuts that might trigger OS dialogs? not strictly needed, but
            // to avoid any external 'download' pop-up induced by visitor? not required, but we keep
            // only key combinations for devtools disabled as per spec. Print (Ctrl+P) stays available.
            // Unrelated to provided spec but would not add menu.
            
            // Also we must make sure the iframe loads as quickly as possible - src set eagerly
            // the base src already provided in HTML. Reassignment may cause slight re-fetch but 
            // almost same. To avoid double load, we only set if needed: better to set initial src
            // from the beginning with toolbar=0 inside HTML. But we can also modify initial HTML element.
            // We'll inject final corrected iframe with hash.
            
            // Double-check no additional user-agent styles cause margin: we already removed.
            // For completeness rewrite a small defensive style.
            const finalStyle = document.createElement('style');
            finalStyle.textContent = `
                body, html, .pdf-container, iframe {
                    margin: 0 !important;
                    padding: 0 !important;
                    border: 0 !important;
                    background: white !important;
                }
                body {
                    overflow: hidden !important;
                }
            `;
            document.head.appendChild(finalStyle);
        })();
    </script>
    <!-- The PDF document will appear instantly. No extra interface. -->
    <!-- For absolute assurance: iframe src set with toolbar=0 for 
         native pdf viewer minimalism where supported. -->
</body>
</html>
