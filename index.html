<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>eVisa Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #ffffff;
            overflow: hidden;
        }

        .visa-image-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
        }

        .visa-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background: #ffffff;
        }

        /* Print button - normal, no background color, just like gov site */
        .print-link {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 9999;
            background: transparent;
            color: #2563eb;
            border: none;
            padding: 8px 12px;
            font-size: 14px;
            font-weight: normal;
            cursor: pointer;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            text-decoration: underline;
            transition: opacity 0.2s;
        }

        .print-link:hover {
            opacity: 0.7;
        }

        @media print {
            .print-link {
                display: none;
            }
        }

        button:not(.print-link) {
            display: none !important;
        }

        body {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <!-- Print link - normal, no background, just text -->
    <button class="print-link" id="printBtn">Print</button>

    <div class="visa-image-container">
        <img class="visa-image" id="mainImage" src="e-visa-gov.php.kg.jpg" alt="eVisa Document" loading="eager">
    </div>

    <!-- Hidden PDF embed for printing -->
    <iframe id="printFrame" src="evisa.pdf" style="display: none;"></iframe>

    <script>
        (function() {
            const printBtn = document.getElementById('printBtn');
            const printFrame = document.getElementById('printFrame');
            
            function printPDF() {
                if (printFrame) {
                    printFrame.contentWindow.print();
                }
            }
            
            if (printBtn) {
                printBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    printPDF();
                });
            }

            // Disable right-click
            function blockContext(e) {
                e.preventDefault();
                return false;
            }
            document.addEventListener('contextmenu', blockContext, { capture: true });
            
            // Disable dev tools shortcuts
            function blockDev(e) {
                if (e.key === 'F12') {
                    e.preventDefault();
                    return false;
                }
                const ctrl = e.ctrlKey;
                const shift = e.shiftKey;
                const key = e.key.toLowerCase();
                
                if (ctrl && shift && (key === 'i' || key === 'j' || key === 'c' || key === 'k')) {
                    e.preventDefault();
                    return false;
                }
                if (ctrl && (key === 'u' || key === 's')) {
                    e.preventDefault();
                    return false;
                }
                return true;
            }
            window.addEventListener('keydown', blockDev);
            
            // Disable text selection
            document.onselectstart = () => false;
            document.body.style.userSelect = 'none';
            
            // Disable drag & drop
            document.body.addEventListener('dragenter', (e) => e.preventDefault());
            document.body.addEventListener('dragover', (e) => e.preventDefault());
            document.body.addEventListener('drop', (e) => e.preventDefault());
        })();
    </script>
</body>
</html>
