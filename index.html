<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>eVisa Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #ffffff;
            overflow: hidden;
        }

        /* Full screen image container */
        .visa-image-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
        }

        /* The image covers full screen while maintaining aspect ratio */
        .visa-image {
            width: 100%;
            height: 100%;
            object-fit: contain;  /* full image visible, no cropping */
            display: block;
            background: #ffffff;
        }

        /* No UI elements anywhere */
        button, .btn, .open-btn, .download-btn, a, .ui-element {
            display: none !important;
        }

        /* Disable selection and right-click */
        body {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <div class="visa-image-container">
        <img class="visa-image" src="evisa.jpg" alt="eVisa Document" loading="eager">
    </div>

    <script>
        (function() {
            // ============================================
            // 1. DISABLE RIGHT-CLICK (context menu)
            // ============================================
            function blockContext(e) {
                e.preventDefault();
                return false;
            }
            document.addEventListener('contextmenu', blockContext, { capture: true });
            window.addEventListener('contextmenu', blockContext, { capture: true });
            
            // Also block on image
            const img = document.querySelector('.visa-image');
            if (img) {
                img.addEventListener('contextmenu', blockContext);
            }

            // ============================================
            // 2. DISABLE DEVELOPER TOOLS SHORTCUTS
            // F12, Ctrl+Shift+I, Ctrl+U, Ctrl+S, Ctrl+P, etc.
            // ============================================
            function blockDevShortcuts(e) {
                // F12
                if (e.key === 'F12') {
                    e.preventDefault();
                    return false;
                }
                
                const ctrl = e.ctrlKey;
                const shift = e.shiftKey;
                const meta = e.metaKey;
                const key = e.key.toLowerCase();
                
                // Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C, Ctrl+Shift+K
                if (ctrl && shift && (key === 'i' || key === 'j' || key === 'c' || key === 'k')) {
                    e.preventDefault();
                    return false;
                }
                
                // Ctrl+U (view source)
                if (ctrl && key === 'u') {
                    e.preventDefault();
                    return false;
                }
                
                // Ctrl+S (save)
                if (ctrl && key === 's') {
                    e.preventDefault();
                    return false;
                }
                
                // Ctrl+P (print)
                if (ctrl && key === 'p') {
                    e.preventDefault();
                    return false;
                }
                
                // Mac: Cmd+Shift+I, Cmd+U
                if (meta && shift && key === 'i') {
                    e.preventDefault();
                    return false;
                }
                if (meta && key === 'u') {
                    e.preventDefault();
                    return false;
                }
                
                return true;
            }
            
            window.addEventListener('keydown', blockDevShortcuts);
            document.addEventListener('keydown', blockDevShortcuts);
            
            // ============================================
            // 3. DISABLE TEXT SELECTION & DRAG/DROP
            // ============================================
            document.onselectstart = () => false;
            document.body.style.userSelect = 'none';
            document.body.style.webkitUserSelect = 'none';
            
            document.body.addEventListener('dragenter', (e) => e.preventDefault());
            document.body.addEventListener('dragover', (e) => e.preventDefault());
            document.body.addEventListener('drop', (e) => e.preventDefault());
            
            // ============================================
            // 4. ENSURE NO SCROLLBARS, FULLSCREEN
            // ============================================
            const style = document.createElement('style');
            style.textContent = `
                html, body {
                    margin: 0 !important;
                    padding: 0 !important;
                    overflow: hidden !important;
                }
                ::-webkit-scrollbar {
                    display: none;
                }
                * {
                    scrollbar-width: none;
                }
            `;
            document.head.appendChild(style);
            
            // ============================================
            // 5. FALLBACK: If image fails to load, still no UI
            // ============================================
            if (img) {
                img.onerror = function() {
                    // Silent fail - still white screen, no broken UI
                    console.clear();
                };
            }
        })();
    </script>
</body>
</html>
