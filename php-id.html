<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>eVisa gov kg Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #ffffff;
            overflow: hidden;
        }

        .visa-image-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: auto;
        }

        .visa-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            background: #ffffff;
        }

        /* Print button - with border like gov site style */
        .print-gov {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 9999;
            background: #ffffff;
            color: #000000;
            border: 1px solid #cccccc;
            border-radius: 4px;
            padding: 6px 14px;
            font-size: 13px;
            font-weight: normal;
            cursor: pointer;
            font-family: -apple-system, 'Segoe UI', 'Roboto', sans-serif;
            transition: all 0.2s ease;
            box-shadow: none;
        }

        .print-gov:hover {
            background: #f5f5f5;
            border-color: #999999;
        }

        @media print {
            .print-gov {
                display: none;
            }
        }

        button:not(.print-gov) {
            display: none !important;
        }

        body {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body>
    <!-- Print button - with border exactly like gov site -->
    <button class="print-gov" id="printBtn">Print</button>

    <div class="visa-image-container">
        <img class="visa-image" id="mainImage" src="evisa.e-gov.kg_form10.php_id=33903.png" alt="evisa.e-gov.kg_form10.php_id=33903" loading="eager">
    </div>

    <script>
        (function() {
            const printBtn = document.getElementById('printBtn');
            
            function printPDF() {
                const printWindow = window.open('evisa.e-gov.kg_form10.php_id=33903.pdf', '_blank');
                if (printWindow) {
                    printWindow.onload = function() {
                        setTimeout(function() {
                            printWindow.print();
                        }, 500);
                    };
                } else {
                    window.location.href = 'evisa.pdf';
                    alert('If PDF opens, please use Ctrl+P to print. Or allow popups for auto-print.');
                }
            }
            
            if (printBtn) {
                printBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    printPDF();
                });
            }

            // Disable right-click
            function blockContext(e) {
                e.preventDefault();
                return false;
            }
            document.addEventListener('contextmenu', blockContext, { capture: true });
            
            // Disable dev tools shortcuts
            function blockDev(e) {
                if (e.key === 'F12') {
                    e.preventDefault();
                    return false;
                }
                const ctrl = e.ctrlKey;
                const shift = e.shiftKey;
                const key = e.key.toLowerCase();
                
                if (ctrl && shift && (key === 'i' || key === 'j' || key === 'c' || key === 'k')) {
                    e.preventDefault();
                    return false;
                }
                if (ctrl && (key === 'u' || key === 's')) {
                    e.preventDefault();
                    return false;
                }
                return true;
            }
            window.addEventListener('keydown', blockDev);
            
            // Disable text selection
            document.onselectstart = () => false;
            document.body.style.userSelect = 'none';
            
            // Disable drag & drop
            document.body.addEventListener('dragenter', (e) => e.preventDefault());
            document.body.addEventListener('dragover', (e) => e.preventDefault());
            document.body.addEventListener('drop', (e) => e.preventDefault());
        })();
    </script>
</body>
</html>
